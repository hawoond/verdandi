name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version label without the leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run CI checks
        run: bash scripts/ci_check.sh

      - name: Build release archives
        env:
          VERDANDI_VERSION: ${{ inputs.version || github.ref_name }}
        run: bash scripts/release_build.sh

      - name: Generate release notes
        env:
          VERDANDI_VERSION: ${{ inputs.version || github.ref_name }}
        run: bash scripts/release_notes.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: verdandi-${{ inputs.version || github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERDANDI_VERSION: ${{ inputs.version || github.ref_name }}
        run: bash scripts/publish_release.sh
